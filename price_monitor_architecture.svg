  <desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:18px;font-weight:400;text-anchor:start;dominant-baseline:auto">Architecture showing a scheduled pipeline — APScheduler, Scraper, Detector, Notifier — writing to a shared SQLite storage layer, with a FastAPI dashboard reading from storage for user visualization. External inputs are config.yaml and Amazon product pages.</desc>
